name: IAmHealthy
options:
  bundleIdPrefix: com.jtrant
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  IAmHealthy:
    type: application
    platform: iOS
    sources:
      - path: IAmHealthy
        excludes:
          - "Preview Content/**"
      - path: IAmHealthy/Preview Content
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jtrant.i-am-healthy
        INFOPLIST_FILE: IAmHealthy/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "I Am Healthy!"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        DEVELOPMENT_ASSET_PATHS: '"IAmHealthy/Preview Content"'
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: IAmHealthy/IAmHealthy.entitlements
    dependencies:
      - sdk: HealthKit.framework
  IAmHealthyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - IAmHealthyTests
    dependencies:
      - target: IAmHealthy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jtrant.i-am-healthy-tests
        GENERATE_INFOPLIST_FILE: "YES"
